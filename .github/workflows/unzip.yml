name: Auto Extract ZIP

on:
  push:
    paths:
      - "*.zip"

jobs:
  unzip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -n 1)

          [ -f "$ZIP" ] || exit 0

          mkdir temp
          unzip -o "$ZIP" -d temp

          ROOT=$(find temp -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -n "$ROOT" ]; then
            cp -r "$ROOT"/. .
          else
            cp -r temp/. .
          fi

          rm -rf temp
          rm -f *.zip

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto extract ZIP"
          git push
