name: Auto Extract ZIP

on:
  push:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP to root
  run: |
    for file in *.zip; do
      [ -f "$file" ] || exit 0
      unzip -o "$file"

      dir=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" | head -n 1)

      if [ -n "$dir" ]; then
        shopt -s dotglob
        mv "$dir"/* .
        rm -rf "$dir"
      fi
    done

      - name: Remove ZIP
        run: rm -f *.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Auto extract ZIP"
          git push
