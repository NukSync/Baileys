name: Extract ZIP to Root

on:
  push:
    paths:
      - "*.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          shopt -s dotglob nullglob

          ZIP=$(ls *.zip | head -n 1)
          unzip -oq "$ZIP" -d extracted

          DIR=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -n "$DIR" ]; then
            mv "$DIR"/* .
          else
            mv extracted/* .
          fi

          rm -rf extracted
          rm -f *.zip

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "Auto extract ZIP"
            git push
          fi
