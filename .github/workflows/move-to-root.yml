name: Move files from Baileys-main to root

on:
  push:
    paths:
      - 'Baileys-main/**'
  workflow_dispatch:

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Move files to root
        run: |
          # Cek apakah folder Baileys-main ada
          if [ -d "Baileys-main" ]; then
            # Pindahkan semua isi ke root
            mv Baileys-main/* . 2>/dev/null || true
            mv Baileys-main/.* . 2>/dev/null || true
            
            # Hapus folder kosong
            rm -rf Baileys-main
            
            # Commit perubahan
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add .
            git commit -m "Pindahkan file dari Baileys-main ke root" || echo "No changes"
            git push
          else
            echo "Folder Baileys-main tidak ditemukan"
          fi
